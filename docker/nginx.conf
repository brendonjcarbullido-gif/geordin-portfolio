# nginx config for the Geordin Zolliecoffer portfolio.
# Serves a Vite-built React SPA with client-side routing fallback,
# long-term caching for hashed assets, and aggressive gzip/brotli.

server {
    listen       80 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Disable nginx server tokens — don't leak version.
    server_tokens off;

    # Hashed Vite assets get a year of immutable caching.
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Original-source images, fonts, files — cache a month, revalidate.
    location ~* \.(webp|jpe?g|png|gif|svg|woff2?|ttf|pdf|mp4|mov)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public";
    }

    # SPA fallback — any path that doesn't match a real file gets the index.
    location / {
        try_files $uri $uri/ /index.html;
        # index.html itself must not be cached so deploys propagate.
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;
}
